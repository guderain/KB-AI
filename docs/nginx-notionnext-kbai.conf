upstream notionnext_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream kb_ai_api {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name wangguanxi.space www.wangguanxi.space;

    client_max_body_size 20m;

    # NotionNext frontend
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_pass http://notionnext_web;
    }

    # KB-AI stream endpoint (disable buffering for SSE)
    location = /kb-ai/api/v1/chat/stream {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header X-Accel-Buffering no;
        proxy_pass http://kb_ai_api/api/v1/chat/stream;
    }

    # KB-AI other endpoints under /kb-ai/
    location /kb-ai/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://kb_ai_api/;
    }
}
